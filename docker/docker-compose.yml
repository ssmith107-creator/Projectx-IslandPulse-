  # ─────────────────────────────────────────────
  # FRONTEND — Nginx static server
  # ─────────────────────────────────────────────
  islandpulse-ui:
    image: nginx:alpine
    container_name: islandpulse-ui
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [islandpulse-coordinator]
    networks: [parish-mesh]
    restart: unless-stopped
    labels:
      - "islandpulse.component=frontend"

networks:
  parish-mesh:
    driver: bridge
    name: islandpulse-parish-mesh
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  redis-data:
    name: islandpulse-redis-data
