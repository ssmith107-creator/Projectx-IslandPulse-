version: '3.9'

# IslandPulse — Jamaica Emergency Resource Mesh
# Simulates independent parish nodes as isolated Docker containers
# Each container = one parish = one independent node in the distributed mesh

services:

  # ─────────────────────────────────────────────
  # PRIMARY COORDINATOR — Kingston (Leader Node)
  # Handles write quorum, leader election, pub/sub
  # ─────────────────────────────────────────────
  islandpulse-coordinator:
    build: ./backend
    container_name: islandpulse-kingston-primary
    ports:
      - "3001:3001"
    environment:
      - NODE_ID=kingston
      - NODE_ROLE=primary
      - IS_LEADER=true
      - REDIS_URL=redis://islandpulse-redis:6379
      - MESH_PORT=3001
      - QUORUM_SIZE=8
    depends_on:
      - islandpulse-redis
    networks:
      - parish-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "islandpulse.parish=Kingston"
      - "islandpulse.role=primary"
      - "islandpulse.region=southeast"

  # ─────────────────────────────────────────────
  # REDIS — Pub/Sub Backbone
  # Keeps every node synced even if primary drops
  # Enables split-brain detection and CRDT merges
  # ─────────────────────────────────────────────
  islandpulse-redis:
    image: redis:7-alpine
    container_name: islandpulse-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save 60 1
      --save 300 100
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - parish-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - "islandpulse.component=cache"
      - "islandpulse.role=pubsub-backbone"

  # ─────────────────────────────────────────────
  # PARISH REPLICA NODES
  # Each runs as an independent process
  # Can survive without the primary (offline-first)
  # ─────────────────────────────────────────────

  node-st-andrew:
    build: ./backend
    container_name: islandpulse-st-andrew
    environment:
      - NODE_ID=stAndrew
      - NODE_ROLE=replica
      - REDIS_URL=redis://islandpulse-redis:6379
      - PRIMARY_URL=http://islandpulse-coordinator:3001
      - MESH_PORT=3002
    depends_on: [islandpulse-redis, islandpulse-coordinator]
    networks: [parish-mesh]
    restart: unless-stopped
    labels:
      - "islandpulse.parish=St. Andrew"
      - "islandpulse.region=southeast"

  node-st-catherine:
